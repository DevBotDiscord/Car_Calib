services:
  vision:
    build:
      context: .
      dockerfile: docker/vision/Dockerfile
      args:
        BASE_IMAGE: ${VISION_BASE_IMAGE:-python:3.11-slim-bookworm}
    image: ${VISION_IMAGE_NAME:-car-calib-vision:latest}
    restart: unless-stopped
    network_mode: host
    depends_on:
      - mqtt
    env_file:
      - .env
    environment:
      MAIN_SHOW_PREVIEW: ${MAIN_SHOW_PREVIEW:-false}
      MAIN_CSV_LOG_FILE: /data/run_log.csv
      MAIN_HTTPS_CERT_FILE: /data/certs/main_stream_cert.pem
      MAIN_HTTPS_KEY_FILE: /data/certs/main_stream_key.pem
    devices:
      - ${VISION_CAMERA_DEVICE:-/dev/video0}:${VISION_CAMERA_DEVICE:-/dev/video0}
    device_cgroup_rules:
      - "c 13:* rmw"
    volumes:
      - /dev/input:/dev/input:ro
      - vision-data:/data

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  vision-data:
  mosquitto-data:
  mosquitto-log:
